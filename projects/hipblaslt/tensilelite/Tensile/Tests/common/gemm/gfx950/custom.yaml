TestParameters:
  marks: [skip-gfx900, skip-gfx906, skip-gfx908, skip-gfx90a, skip-gfx940, skip-gfx941, skip-gfx942, skip-gfx1010, skip-gfx1011, skip-gfx1012, skip-gfx1030, skip-gfx1100, skip-gfx1101, skip-gfx1102, skip-gfx1200, skip-gfx1201] # not supported by arch

GlobalParameters:
  #MinimumRequiredVersion: 4.14.0
  SleepPercent: 50
  NumElementsToValidate: -1
  NumWarmups: 1
  EnqueuesPerSync: 1
  DataInitTypeBeta: 0
  DataInitTypeAlpha: 1
  DataInitTypeA: 12
  DataInitTypeB: 13
  NewClient: 2
  CSVExportWinner: 1
  CSVMergeSameProblemID: 1
  Device: 0
  RotatingBufferSize: 512
  DeviceLDS: 163840
  MaxLDS: 163840
  PrintSolutionRejectionReason: True

BenchmarkProblems:
  ########################################
  # TN - standard
  ########################################
  -
    - # ProblemType
      OperationType: GEMM
      DataType: b
      DestDataType: b
      ComputeDataType: s
      HighPrecisionAccumulate: True
      TransposeA: 1
      TransposeB: 0
      UseBeta: True
      UseBias: 1
      BiasDataTypeList: [s, b]
      UseScaleAlphaVec: 1
      Batched: True
      Activation: True
      ActivationType: hipblaslt_all
      ActivationFuncCall: true
      ActivationHPA: True
    -
      BenchmarkCommonParameters:
        - KernelLanguage: ["Assembly"]
      CustomKernels:
        ["Custom_Cijk_Alik_Bljk_BBS_BH_Bias_HA_S_SAV_NTD_SK3_UserArgs_MT256x256x64_MI16x16x1_shortname0_gfx950"]
      ForkParameters:
      BenchmarkJoinParameters:
      BenchmarkFinalParameters:
        - ProblemSizes:
          - Range: [[17, 235, 1024], [2, 127, 600], [1], [1, 13, 400]]
        - BiasTypeArgs: ['b']

  ########################################
  # NT - standard
  ########################################
