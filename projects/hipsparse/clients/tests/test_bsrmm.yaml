---
include: hipsparse_common.yaml


Tests:
- name: bsrmm_bad_arg
  category: pre_checkin
  function: bsrmm_bad_arg
  precision: *single_double_precisions_complex_real

- name: bsrmm
  category: quick
  function: bsrmm
  precision: *single_double_precisions_complex_real
  M: [42, 2059]
  N: [7, 78]
  K: [50, 1375]
  block_dim: [4, 7, 16]
  alpha: [-0.5]
  alphai: [0.7]
  beta: [0.5]
  betai: [1.5]
  dirA: [HIPSPARSE_DIRECTION_ROW, HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]

- name: bsrmm
  category: pre_checkin
  function: bsrmm
  precision: *single_double_precisions_complex_real
  M: 1
  N: [9, 23]
  K: 1
  block_dim: [5]
  alpha: [0.75]
  alphai: [0.4]
  beta: [-0.5]
  betai: [1.0]
  dirA: [HIPSPARSE_DIRECTION_COLUMN]
  transA: [HIPSPARSE_OPERATION_NON_TRANSPOSE]
  transB: [HIPSPARSE_OPERATION_NON_TRANSPOSE, HIPSPARSE_OPERATION_TRANSPOSE]
  baseA: [HIPSPARSE_INDEX_BASE_ZERO, HIPSPARSE_INDEX_BASE_ONE]
  filename: [rma10, 
             scircuit, 
             nos1, 
             nos3, 
             nos5, 
             nos7]