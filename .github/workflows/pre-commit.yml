name: "pre-commit checks"
on:
  pull_request:
    branches:
      - develop

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0 # 0 fetches all commit history for --from-ref/--to-ref to function

      - name: Filter changed files
        id: filter
        run: |
          # Add the name of your project folder to enable pre-commit checks for it
          OPTED_IN_PROJECTS=("hipdnn")

          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)

          # Filter changed files to opted-in projects
          FILTERED_FILES=""
          for project in "${OPTED_IN_PROJECTS[@]}"; do
            PROJECT_FILES=$(echo "$CHANGED_FILES" | grep -e "^projects/$project/" -e "^shared/$project/" || true)
            if [ -n "$PROJECT_FILES" ]; then
              FILTERED_FILES="$FILTERED_FILES $PROJECT_FILES"

              # Flag for conditional dependency installation
              echo "${project}_changed=true" >> $GITHUB_OUTPUT
            fi
          done

          # Add any files outside the projects and shared folders
          NON_PROJECT_FILES=$(echo "$CHANGED_FILES" | grep -v -e "^projects/" -e "^shared/" || true)
          if [ -n "$NON_PROJECT_FILES" ]; then
            FILTERED_FILES="$FILTERED_FILES $NON_PROJECT_FILES"
          fi

          # Trim whitespace
          FILTERED_FILES=$(echo $FILTERED_FILES | xargs)

          if [ -z "$FILTERED_FILES" ]; then
            echo ""
            echo "================================================"
            echo "Skipping pre-commit checks"
            echo "================================================"
            echo ""
            echo "No change found in projects using pre-commit"
            echo "Opted-in projects: ${OPTED_IN_PROJECTS[*]}"
            echo ""
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Running pre-commit on the following files:"
            echo "$FILTERED_FILES" | tr ' ' '\n'
            echo ""
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILTERED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.12'

      - name: Install core dependencies
        if: steps.filter.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      # If hipdnn_changed then FILTERED_FILES is unempty.
      # Hence, this is only conditional on hipdnn_changed.
      - name: Install hipDNN dependencies
        if: steps.filter.outputs.hipdnn_changed == 'true'
        run: |
          # Install flatc for hipDNN
          wget -q https://github.com/google/flatbuffers/releases/download/v25.9.23/Linux.flatc.binary.g++-13.zip
          unzip -q Linux.flatc.binary.g++-13.zip
          sudo mv flatc /usr/local/bin/
          sudo chmod +x /usr/local/bin/flatc
          rm Linux.flatc.binary.g++-13.zip

      # Add additional project-specific dependency steps here as needed
      # Example:
      # - name: Install <project-name> dependencies
      #   if: steps.filter.outputs.<project-name>_changed == 'true'
      #   run: |
      #     # Install project-specific dependencies

      - name: Run pre-commit checks
        if: steps.filter.outputs.should_run == 'true'
        run: |
          echo "================================================"
          echo "Running pre-commit checks on changed files..."
          echo "================================================"
          echo ""

          FILTERED_FILES="${{ steps.filter.outputs.files }}"

          if ! pre-commit run --show-diff-on-failure --files $FILTERED_FILES; then
            echo ""
            echo "================================================"
            echo "❌ Pre-commit checks FAILED"
            echo "================================================"
            echo ""
            echo "Please fix the issues above and commit the changes."
            echo ""
            echo "To run pre-commit locally on eligible changed files:"
            echo "  pre-commit run --files $FILTERED_FILES"
            echo ""
            echo "Or install pre-commit hooks to run automatically on commits:"
            echo "  pip install pre-commit"
            echo "  pre-commit install"
            echo ""
            exit 1
          fi

          echo ""
          echo "================================================"
          echo "✅ All pre-commit checks passed"
          echo "================================================"
